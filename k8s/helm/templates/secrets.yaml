apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dongqidb.fullname" . }}-secrets
type: Opaque
stringData:
  jwt-secret: {{ .Values.config.jwt.secretKey | default (randAlphaNum 32) | quote }}
  anthropic-api-key: {{ .Values.config.ai.apiKey | default "" | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dongqidb.fullname" . }}-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dongqidb.fullname" . }}-logs
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
